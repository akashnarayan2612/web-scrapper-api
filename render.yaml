services:
  - type: web
    name: product-scraper-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false # You'll paste this in Render dashboard
      - key: MONGO_DB_NAME
        value: food_scraper
